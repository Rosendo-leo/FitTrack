name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Verifica se versionName bate com a tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME nao bate com versionName=\"$GRADLE_VERSION\" em app/build.gradle.kts. Bump o versionName antes de criar a tag."
            exit 1
          fi
          echo "OK: tag $GITHUB_REF_NAME == versionName $GRADLE_VERSION"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret KEYSTORE_BASE64 ausente. Um APK sem assinatura não instala no Android."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

          # Detecta o alias real da chave privada (PFX do Windows usa nome interno)
          ALIAS=$(keytool -list -keystore "$RUNNER_TEMP/keystore.jks" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null \
            | grep -i "PrivateKeyEntry" | head -n1 | cut -d',' -f1)
          if [ -z "$ALIAS" ]; then
            echo "::error::Nenhuma chave privada encontrada no keystore (senha errada?)."
            exit 1
          fi
          echo "::add-mask::$ALIAS"
          echo "KEY_ALIAS=$ALIAS" >> "$GITHUB_ENV"
          echo "Alias detectado com sucesso."

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK and compute SHA256
        run: |
          APK_SRC=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          APK="fittrack-${{ github.ref_name }}.apk"
          cp "$APK_SRC" "$APK"
          sha256sum "$APK" > "$APK.sha256"
          cat "$APK.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fittrack-*.apk
            fittrack-*.apk.sha256
          generate_release_notes: true
